basePath: /api
definitions:
  models.Device:
    properties:
      device_name:
        type: string
      fingerprint:
        type: string
      id:
        type: string
      is_active:
        type: boolean
      registered_at:
        type: string
      registered_by:
        type: string
    type: object
  models.Log:
    properties:
      action:
        type: string
      created_at:
        type: string
      created_by:
        type: string
      device_id:
        type: string
      event:
        type: string
      id:
        type: string
      log_date:
        type: string
      log_time:
        type: string
      operator_name:
        type: string
      station_id:
        type: string
      updated_at:
        type: string
    type: object
  models.Station:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
host: localhost:3000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: A REST API for E-Logging with authentication, device management, and
    log tracking.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: E-Logging API
  version: "1.0"
paths:
  /admin/create-admin:
    post:
      consumes:
      - application/json
      description: 'Creates the initial admin user without authentication. IMPORTANT:
        Comment out this endpoint after creating your first admin user for security
        reasons.'
      parameters:
      - description: Admin user data
        in: body
        name: admin
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created admin user
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or user already exists
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Create admin user (SETUP ONLY)
      tags:
      - users
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password and returns JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: login
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Access and refresh tokens
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: User login
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates a new access token using a valid refresh token
      parameters:
      - description: Refresh token
        in: body
        name: refresh
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: New access token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid refresh token
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      summary: Refresh access token
      tags:
      - auth
  /devices:
    get:
      description: Retrieves a list of all registered devices (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: List of devices
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (admin only)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all devices
      tags:
      - devices
    post:
      consumes:
      - application/json
      description: Registers a new device with device fingerprint (admin only)
      parameters:
      - description: Device data
        in: body
        name: device
        required: true
        schema:
          $ref: '#/definitions/models.Device'
      produces:
      - application/json
      responses:
        "201":
          description: Created device
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (admin only)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create device
      tags:
      - devices
  /devices/{id}:
    delete:
      description: Deactivates a device by ID (admin only)
      parameters:
      - description: Device ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device deactivated
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid device ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (admin only)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Deactivate device
      tags:
      - devices
  /logs:
    get:
      description: Retrieves logs with optional filtering, sorting, and pagination
      parameters:
      - default: created_at
        description: Sort by field (created_at, log_date)
        in: query
        name: sort_by
        type: string
      - default: desc
        description: Sort order (asc, desc)
        in: query
        name: order
        type: string
      - description: Filter by station ID (UUID)
        in: query
        name: station_id
        type: string
      - description: Filter logs from date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: Filter logs until date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      - default: 10
        description: Limit number of results
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of logs
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid query parameters
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get logs
      tags:
      - logs
    post:
      consumes:
      - application/json
      description: Creates a new log entry (requires device fingerprint middleware)
      parameters:
      - description: Log data
        in: body
        name: log
        required: true
        schema:
          $ref: '#/definitions/models.Log'
      produces:
      - application/json
      responses:
        "201":
          description: Created log
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create log
      tags:
      - logs
  /logs/{id}:
    put:
      consumes:
      - application/json
      description: Updates a log entry. Only the creator can update, and only within
        24 hours of creation
      parameters:
      - description: Log ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Updated log data
        in: body
        name: log
        required: true
        schema:
          $ref: '#/definitions/models.Log'
      produces:
      - application/json
      responses:
        "200":
          description: Updated log
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or ID
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (not creator or after 24 hours)
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Log not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update log
      tags:
      - logs
  /logs/export:
    get:
      description: Exports filtered logs to CSV format
      parameters:
      - default: created_at
        description: Sort by field
        in: query
        name: sort_by
        type: string
      - default: desc
        description: Sort order (asc, desc)
        in: query
        name: order
        type: string
      - description: Filter by station ID (UUID)
        in: query
        name: station_id
        type: string
      - description: Filter from date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: Filter until date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: CSV file with logs
          schema:
            type: file
        "400":
          description: Invalid query parameters
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Export logs to CSV
      tags:
      - logs
  /stations:
    get:
      description: Retrieves a list of all stations
      produces:
      - application/json
      responses:
        "200":
          description: List of stations
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all stations
      tags:
      - stations
    post:
      consumes:
      - application/json
      description: Creates a new station (admin only)
      parameters:
      - description: Station data
        in: body
        name: station
        required: true
        schema:
          $ref: '#/definitions/models.Station'
      produces:
      - application/json
      responses:
        "201":
          description: Created station
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (admin only)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create station
      tags:
      - stations
  /stt:
    post:
      consumes:
      - multipart/form-data
      description: Converts audio files to text using OpenAI's Whisper API
      parameters:
      - description: Audio file (MP3, WAV, M4A, etc.)
        in: formData
        name: audio
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Transcription result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Missing audio file
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Failed to transcribe audio
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Transcribe audio to text
      tags:
      - stt
  /users:
    get:
      description: Retrieves a list of all users (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: List of users
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (admin only)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get all users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Creates a new user with email and password (admin only)
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created user
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden (admin only)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create user
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
